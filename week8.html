<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная: Generics & Utility Types</title>
    <style>
        body { 
            background-color: #fbf0ff; 
            color: #5d4d4d; 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            line-height: 1.6;
        }
        h1 { 
            color: #e185ff; 
            text-align: center; 
            font-size: 26px;
            margin-bottom: 30px;
        }
        .form-group { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            border: 2px solid #f5ccff; 
            box-shadow: 0 4px 10px rgba(255, 133, 161, 0.1);
            margin-bottom: 25px; 
        }

        h3 { 
            color: #e585ff; 
            margin-top: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input { 
            padding: 10px 15px; 
            margin: 8px 0; 
            width: calc(100% - 34px); 
            border: 1.5px solid #f9ccff; 
            border-radius: 12px; 
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #d485ff;
        } 
        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #d685ff; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover { 
            background: #c14dff;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }
        #apiBtn { 
            background: #fff; 
            color: #f185ff; 
            border: 2px solid #f5ccff;
            margin-bottom: 10px;
        }

        #apiBtn:hover {
            background: #fff5ff;
        }
        ul { 
            list-style-type: none; 
            padding: 0; 
        }

        li { 
            background: white; 
            margin: 10px 0; 
            padding: 15px; 
            border-radius: 15px; 
            border-left: 6px solid #f8c3ff; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .student-info {
            display: flex;
            flex-direction: column;
        }

        .student-name {
            font-weight: bold;
            color: #d34dff;
        }

        .student-meta {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <h1>Лабораторная: Generics & Utility Types</h1>

    <div class="form-group">
        <h3><span>💮</span> Добавить студента</h3>
        <input type="text" id="nameInput" placeholder="Введите имя...">
        <input type="number" id="ageInput" placeholder="Возраст" value="18">
        <input type="number" id="courseInput" placeholder="Курс" value="1">
        <button id="addBtn">Добавить в список</button>
    </div>

    <div class="form-group" style="text-align: center;">
        <button id="apiBtn">✨ Загрузить данные из API ✨</button>
    </div>

    <div class="form-group">
        <h3><span>🪷</span> Список группы:</h3>
        <ul id="studentList">
            </ul>
    </div>

    <script src="week8.js"></script>

</body>
</html>
